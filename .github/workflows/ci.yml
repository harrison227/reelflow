name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm db:generate --no-statements || true

      - run: pnpm test

      - run: pnpm build
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
          AUTH_SECRET: ci-secret-must-be-at-least-32-characters-long-xxx
          AUTH_URL: http://localhost:3000
          EMAIL_FROM: ci@example.com
          B2_ENDPOINT: http://localhost:9000
          B2_BUCKET: ci
          B2_ACCESS_KEY_ID: ci
          B2_SECRET_ACCESS_KEY: ci
