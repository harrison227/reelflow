services:
  postgres:
    image: postgres:16-alpine
    container_name: reelflow-postgres
    environment:
      POSTGRES_USER: reelflow
      POSTGRES_PASSWORD: reelflow
      POSTGRES_DB: reelflow
    ports:
      - "5432:5432"
    volumes:
      - reelflow-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reelflow"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: reelflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - reelflow-minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  reelflow-pg:
  reelflow-minio:
