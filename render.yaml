databases:
  - name: reelflow-db
    plan: free
    region: oregon
    databaseName: reelflow
    user: reelflow

services:
  - type: web
    name: reelflow
    runtime: node
    plan: free
    region: oregon
    buildCommand: corepack enable && pnpm install --frozen-lockfile --prod=false && pnpm build
    preDeployCommand: pnpm db:migrate
    startCommand: pnpm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: reelflow-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_URL
        value: https://reelflow-8uok.onrender.com
      - key: B2_ENDPOINT
        value: https://s3.us-west-002.backblazeb2.com
      - key: B2_REGION
        value: us-west-002
      - key: B2_BUCKET
        value: placeholder
      - key: B2_ACCESS_KEY_ID
        value: placeholder
      - key: B2_SECRET_ACCESS_KEY
        value: placeholder
      - key: LOG_LEVEL
        value: warn
